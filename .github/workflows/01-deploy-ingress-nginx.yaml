name: Deploy ingress-nginx Controller
run-name: "Deploy ingress-nginx | ${{ github.event_name }}"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ingress-nginx/**"
      - ".github/workflows/01-deploy-ingress-nginx.yaml"

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    environment: staging

    env:
      INGRESS_NAMESPACE: ingress-nginx
      RELEASE_NAME: ingress-nginx

    steps:
      - uses: actions/checkout@v4

      - name: Debug runner host
        run: |
          hostname
          whoami
          helm version
          sudo kubectl version --client

      - name: Set up kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"

          if [ -n "${KUBECONFIG_CONTENT:-}" ]; then
            printf '%s\n' "${KUBECONFIG_CONTENT}" | tr -d '\r' > "$HOME/.kube/config"
          fi

          if ! kubectl --kubeconfig "$HOME/.kube/config" cluster-info >/dev/null 2>&1; then
            echo "Provided KUBECONFIG cannot reach cluster. Falling back to /etc/rancher/k3s/k3s.yaml"
            sudo cp /etc/rancher/k3s/k3s.yaml "$HOME/.kube/config"
            sudo chown "$(id -u):$(id -g)" "$HOME/.kube/config"
          fi

          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"
          kubectl --kubeconfig "$HOME/.kube/config" cluster-info

      - name: Ensure ingress namespace exists
        run: |
          sudo kubectl create namespace $INGRESS_NAMESPACE --dry-run=client -o yaml | sudo kubectl apply -f -

      - name: Add ingress-nginx Helm repo
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update ingress-nginx

      - name: Deploy ingress-nginx
        run: |
          helm upgrade --install $RELEASE_NAME ingress-nginx/ingress-nginx \
            -n $INGRESS_NAMESPACE \
            --create-namespace \
            -f ./ingress-nginx/values.yaml \
            --wait --timeout 600s

      - name: Debug rollout on failure
        if: ${{ failure() }}
        run: |
          set +e
          sudo kubectl get pods -n "$INGRESS_NAMESPACE" -o wide
          sudo kubectl describe deployment -n "$INGRESS_NAMESPACE"
          sudo kubectl describe daemonset -n "$INGRESS_NAMESPACE"
          sudo kubectl get events -n "$INGRESS_NAMESPACE" --sort-by=.metadata.creationTimestamp | tail -n 100

      - name: Verify
        run: |
          helm status $RELEASE_NAME -n $INGRESS_NAMESPACE
          sudo kubectl get pods -n $INGRESS_NAMESPACE -o wide
          sudo kubectl get svc -n $INGRESS_NAMESPACE
          sudo kubectl get ingressclass

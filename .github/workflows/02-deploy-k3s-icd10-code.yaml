name: Deploy to K3s ICD10 Code Service (Helm)
run-name: "Deploy ICD10 Code | ${{ github.event_name }}"

on:
  repository_dispatch:
    types: [icd10_code_image_built]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (v1.2.3)"
        required: true
      image_repo:
        description: "Docker image repository (owner/repo)"
        required: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    environment: staging

    env:
      K3S_NAMESPACE: num
      RELEASE_NAME: icd10-code-service

    steps:
      - uses: actions/checkout@v4

      - name: Resolve deploy inputs
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            IMAGE_TAG='${{ github.event.client_payload.image_tag }}'
            IMAGE_REPO='${{ github.event.client_payload.image_repo }}'
          else
            IMAGE_TAG='${{ github.event.inputs.image_tag }}'
            IMAGE_REPO='${{ github.event.inputs.image_repo }}'
          fi

          if ! echo "${IMAGE_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid image tag: ${IMAGE_TAG}. Expected v1.2.3 format."
            exit 1
          fi

          if [ -z "${IMAGE_REPO}" ]; then
            echo "Image repo is empty."
            exit 1
          fi

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_REPO=${IMAGE_REPO}" >> "$GITHUB_ENV"
          echo "Deploying ${IMAGE_REPO}:${IMAGE_TAG}"

      - name: Set up kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"

          if [ -n "${KUBECONFIG_CONTENT:-}" ]; then
            printf '%s\n' "${KUBECONFIG_CONTENT}" | tr -d '\r' > "$HOME/.kube/config"
          fi

          if ! kubectl --kubeconfig "$HOME/.kube/config" cluster-info >/dev/null 2>&1; then
            echo "Provided KUBECONFIG cannot reach cluster. Falling back to /etc/rancher/k3s/k3s.yaml"
            sudo cp /etc/rancher/k3s/k3s.yaml "$HOME/.kube/config"
            sudo chown "$(id -u):$(id -g)" "$HOME/.kube/config"
          fi

          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"
          kubectl --kubeconfig "$HOME/.kube/config" cluster-info

      - name: Ensure namespace exists
        run: |
          sudo kubectl create namespace $K3S_NAMESPACE --dry-run=client -o yaml | sudo kubectl apply -f -

      - name: Deploy ICD10 Code Service (Helm)
        run: |
          helm upgrade --install $RELEASE_NAME ./charts/icd10-code-service \
            -n $K3S_NAMESPACE \
            --create-namespace \
            --set image.repository=$IMAGE_REPO \
            --set image.tag=$IMAGE_TAG \
            --wait --timeout 600s

      - name: Debug rollout on failure
        if: ${{ failure() }}
        run: |
          set +e
          sudo kubectl get pods -n "$K3S_NAMESPACE" -o wide
          sudo kubectl describe deployment/"$RELEASE_NAME" -n "$K3S_NAMESPACE"
          sudo kubectl describe pods -n "$K3S_NAMESPACE"
          sudo kubectl get events -n "$K3S_NAMESPACE" --sort-by=.metadata.creationTimestamp | tail -n 100

      - name: Verify
        run: |
          helm status $RELEASE_NAME -n $K3S_NAMESPACE
          sudo kubectl rollout status deployment/$RELEASE_NAME -n $K3S_NAMESPACE
          sudo kubectl get pods -n $K3S_NAMESPACE
          sudo kubectl get svc -n $K3S_NAMESPACE


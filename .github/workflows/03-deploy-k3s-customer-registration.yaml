name: Deploy to K3s Customer Registration (Helm)
run-name: "Deploy Customer Registration | ${{ github.event_name }}"

on:
  repository_dispatch:
    types: [customer_registration_image_built]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (v1.2.3)"
        required: true
      image_repo:
        description: "Docker image repository (owner/repo)"
        required: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64]
    environment: production

    env:
      K3S_NAMESPACE: num
      DB_RELEASE_NAME: customer-registration-db
      APP_RELEASE_NAME: customer-registration

    steps:
      - uses: actions/checkout@v4

      - name: Resolve deploy inputs
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            IMAGE_TAG='${{ github.event.client_payload.image_tag }}'
            IMAGE_REPO='${{ github.event.client_payload.image_repo }}'
          else
            IMAGE_TAG='${{ github.event.inputs.image_tag }}'
            IMAGE_REPO='${{ github.event.inputs.image_repo }}'
          fi

          if ! echo "${IMAGE_TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid image tag: ${IMAGE_TAG}. Expected v1.2.3 format."
            exit 1
          fi

          if [ -z "${IMAGE_REPO}" ]; then
            echo "Image repo is empty."
            exit 1
          fi

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_REPO=${IMAGE_REPO}" >> "$GITHUB_ENV"
          echo "Deploying ${IMAGE_REPO}:${IMAGE_TAG}"

      - name: Debug runner host
        run: |
          hostname
          whoami
          helm version
          sudo kubectl version --client

      - name: Set up kubeconfig
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"

          if [ -n "${KUBECONFIG_CONTENT:-}" ]; then
            printf '%s\n' "${KUBECONFIG_CONTENT}" | tr -d '\r' > "$HOME/.kube/config"
          fi

          if ! kubectl --kubeconfig "$HOME/.kube/config" cluster-info >/dev/null 2>&1; then
            echo "Provided KUBECONFIG cannot reach cluster. Falling back to /etc/rancher/k3s/k3s.yaml"
            sudo cp /etc/rancher/k3s/k3s.yaml "$HOME/.kube/config"
            sudo chown "$(id -u):$(id -g)" "$HOME/.kube/config"
          fi

          chmod 600 "$HOME/.kube/config"
          echo "KUBECONFIG=$HOME/.kube/config" >> "$GITHUB_ENV"
          kubectl --kubeconfig "$HOME/.kube/config" cluster-info

      - name: Ensure namespace exists
        run: |
          sudo kubectl create namespace $K3S_NAMESPACE --dry-run=client -o yaml | sudo kubectl apply -f -

      - name: Upsert customer registration DB secret
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.CUSTOMER_DB_USERNAME }}" ] || [ -z "${{ secrets.CUSTOMER_DB_PASSWORD }}" ]; then
            echo "CUSTOMER_DB_USERNAME or CUSTOMER_DB_PASSWORD is empty. Set both GitHub environment secrets before deploying."
            exit 1
          fi

          cat <<EOF | sudo kubectl apply -n $K3S_NAMESPACE -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: customer-registration-db-secrets
          type: Opaque
          stringData:
            postgresUser: "${{ secrets.CUSTOMER_DB_USERNAME }}"
            postgresPassword: "${{ secrets.CUSTOMER_DB_PASSWORD }}"
          EOF

      - name: Upsert customer registration app secret
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.CUSTOMER_DB_USERNAME }}" ] || [ -z "${{ secrets.CUSTOMER_DB_PASSWORD }}" ]; then
            echo "CUSTOMER_DB_USERNAME or CUSTOMER_DB_PASSWORD is empty. Set both GitHub environment secrets before deploying."
            exit 1
          fi

          cat <<EOF | sudo kubectl apply -n $K3S_NAMESPACE -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: customer-registration-secrets
          type: Opaque
          stringData:
            springDatasourceUsername: "${{ secrets.CUSTOMER_DB_USERNAME }}"
            springDatasourcePassword: "${{ secrets.CUSTOMER_DB_PASSWORD }}"
          EOF

      - name: Lint customer registration charts
        run: |
          helm lint ./charts/customer-registration-db
          helm lint ./charts/customer-registration

      - name: Deploy customer registration DB
        run: |
          set -euo pipefail

          sudo kubectl scale deployment/$DB_RELEASE_NAME -n $K3S_NAMESPACE --replicas=0 || true
          sudo kubectl wait --for=delete pod -l app.kubernetes.io/instance=$DB_RELEASE_NAME -n $K3S_NAMESPACE --timeout=120s || true
          if ! helm upgrade --install $DB_RELEASE_NAME ./charts/customer-registration-db \
            -n $K3S_NAMESPACE \
            --create-namespace \
            --set secrets.create=false \
            --set secrets.existingSecret=customer-registration-db-secrets \
            --set persistence.enabled=false \
            --wait --timeout 600s; then
            sudo kubectl get pods -n "$K3S_NAMESPACE" -o wide || true
            sudo kubectl describe deployment/"$DB_RELEASE_NAME" -n "$K3S_NAMESPACE" || true
            sudo kubectl describe pods -n "$K3S_NAMESPACE" -l app.kubernetes.io/instance="$DB_RELEASE_NAME" || true
            DB_POD="$(sudo kubectl get pod -n "$K3S_NAMESPACE" -l app.kubernetes.io/instance="$DB_RELEASE_NAME" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
            if [ -n "${DB_POD}" ]; then
              sudo kubectl logs "$DB_POD" -n "$K3S_NAMESPACE" --all-containers=true --tail=200 || true
            fi
            exit 1
          fi

      - name: Deploy customer registration app
        run: |
          sudo kubectl scale deployment/$APP_RELEASE_NAME -n $K3S_NAMESPACE --replicas=0 || true
          sudo kubectl wait --for=delete pod -l app.kubernetes.io/instance=$APP_RELEASE_NAME -n $K3S_NAMESPACE --timeout=120s || true
          helm upgrade --install $APP_RELEASE_NAME ./charts/customer-registration \
            -n $K3S_NAMESPACE \
            --create-namespace \
            --set image.repository=$IMAGE_REPO \
            --set image.tag=$IMAGE_TAG \
            --set secrets.create=false \
            --set secrets.existingSecret=customer-registration-secrets \
            --set nodeSelector."kubernetes\\.io/hostname"=ip-172-31-16-124 \
            --wait --timeout 600s

      - name: Debug rollout on failure
        if: ${{ failure() }}
        run: |
          set +e
          sudo kubectl get pods -n "$K3S_NAMESPACE" -o wide
          sudo kubectl describe deployment/"$DB_RELEASE_NAME" -n "$K3S_NAMESPACE"
          sudo kubectl describe deployment/"$APP_RELEASE_NAME" -n "$K3S_NAMESPACE"
          sudo kubectl describe pods -n "$K3S_NAMESPACE"
          APP_POD="$(sudo kubectl get pod -n "$K3S_NAMESPACE" -l app.kubernetes.io/instance="$APP_RELEASE_NAME" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
          if [ -n "${APP_POD}" ]; then
            sudo kubectl logs "$APP_POD" -n "$K3S_NAMESPACE" --all-containers=true --tail=200 || true
            sudo kubectl logs "$APP_POD" -n "$K3S_NAMESPACE" --all-containers=true --previous --tail=200 || true
          fi
          sudo kubectl get events -n "$K3S_NAMESPACE" --sort-by=.metadata.creationTimestamp | tail -n 100

      - name: Verify
        run: |
          helm status $DB_RELEASE_NAME -n $K3S_NAMESPACE
          helm status $APP_RELEASE_NAME -n $K3S_NAMESPACE
          sudo kubectl rollout status deployment/$DB_RELEASE_NAME -n $K3S_NAMESPACE
          sudo kubectl rollout status deployment/$APP_RELEASE_NAME -n $K3S_NAMESPACE
          sudo kubectl get pods -n $K3S_NAMESPACE
          sudo kubectl get svc -n $K3S_NAMESPACE

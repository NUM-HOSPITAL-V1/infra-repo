name: Ansible Setup
run-name: "Ansible | ${{ github.event.inputs.target_env }} | ${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Суулгах орчин"
        required: true
        type: choice
        options:
          - staging
          - prod

permissions:
  contents: read

jobs:
  setup-staging:
    if: github.event.inputs.target_env == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30
    env:
      AWS_DEFAULT_REGION: eu-north-1
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: hospital-backend/terraform.tfstate
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Get IPs from Terraform state
        id: tf
        run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_DEFAULT_REGION}" \
            -backend-config="use_lockfile=true" \
            -backend-config="encrypt=true"

          CONTROL_IP=$(terraform output -raw instance_public_ip)
          WORKER1_IP=$(terraform output -raw worker_instance_public_ip)
          WORKER2_IP=$(terraform output -raw worker2_instance_public_ip)
          WORKER3_IP=$(terraform output -raw worker3_instance_public_ip)

          echo "control_ip=${CONTROL_IP}"   >> "$GITHUB_OUTPUT"
          echo "worker1_ip=${WORKER1_IP}"   >> "$GITHUB_OUTPUT"
          echo "worker2_ip=${WORKER2_IP}"   >> "$GITHUB_OUTPUT"
          echo "worker3_ip=${WORKER3_IP}"   >> "$GITHUB_OUTPUT"
        working-directory: terraform

      - name: Install ansible
        run: sudo apt update && sudo apt install -y ansible

      - name: Setup SSH key
        run: |
          mkdir -p "$HOME/.ssh"
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"

      - name: Build dynamic inventory
        run: |
          mkdir -p "$HOME/.ssh"
          cat > /tmp/inventory.ini << EOF
          [control]
          ${{ steps.tf.outputs.control_ip }} ansible_user=ubuntu

          [workers]
          ${{ steps.tf.outputs.worker1_ip }} ansible_user=ubuntu
          ${{ steps.tf.outputs.worker2_ip }} ansible_user=ubuntu
          ${{ steps.tf.outputs.worker3_ip }} ansible_user=ubuntu

          [all:children]
          control
          workers
          EOF

          ssh-keyscan -T 10 -H ${{ steps.tf.outputs.control_ip }} >> "$HOME/.ssh/known_hosts" || true
          ssh-keyscan -T 10 -H ${{ steps.tf.outputs.worker1_ip }} >> "$HOME/.ssh/known_hosts" || true
          ssh-keyscan -T 10 -H ${{ steps.tf.outputs.worker2_ip }} >> "$HOME/.ssh/known_hosts" || true
          ssh-keyscan -T 10 -H ${{ steps.tf.outputs.worker3_ip }} >> "$HOME/.ssh/known_hosts" || true
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Run Ansible (K3s)
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i /tmp/inventory.ini \
            --private-key "$HOME/.ssh/id_rsa" \
            ansible/install-k3s.yml

  setup-prod:
    if: github.event.inputs.target_env == 'prod'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible + sshpass
        run: sudo apt update && sudo apt install -y ansible sshpass

      - name: Add host key
        run: |
          mkdir -p "$HOME/.ssh"
          ssh-keyscan -T 10 -H ${{ secrets.SERVER_HOST }} >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Run Ansible (Docker)
        run: |
          ansible-playbook \
            -i ansible/inventories/prod/inventory.ini \
            ansible/install-docker.yml \
            --extra-vars "ansible_password=$PROD_SSH_PASSWORD ansible_become_pass=$PROD_SSH_PASSWORD"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          PROD_SSH_PASSWORD: ${{ secrets.SERVER_SSH_PASSWORD }}

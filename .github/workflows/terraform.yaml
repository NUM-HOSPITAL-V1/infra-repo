name: Terraform
run-name: "Terraform | ${{ github.event_name }} | ${{ github.ref_name }}"

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yaml"

  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yaml"

  workflow_dispatch:

permissions:
  contents: read

jobs:

  plan:
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      AWS_DEFAULT_REGION: eu-north-1
      TF_INPUT: "false"
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: hospital-backend/terraform.tfstate
      TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - name: Validate backend config
        run: |
          set -euo pipefail
          test -n "${TF_STATE_BUCKET}" || (echo "TF_STATE_BUCKET secret is empty" && exit 1)
          test -n "${TF_STATE_LOCK_TABLE}" || (echo "TF_STATE_LOCK_TABLE secret is empty" && exit 1)

      - run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_DEFAULT_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"
        working-directory: terraform

      - name: Validate tfvars file
        run: test -f terraform.tfvars || (echo "terraform/terraform.tfvars is missing" && exit 1)
        working-directory: terraform

      - run: terraform plan -input=false -no-color -var-file=terraform.tfvars
        working-directory: terraform


  apply:
    runs-on: ubuntu-latest
    needs: plan
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.plan.result == 'success') || (github.event_name == 'workflow_dispatch' && needs.plan.result == 'success')
    env:
      AWS_DEFAULT_REGION: eu-north-1
      TF_INPUT: "false"
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: hospital-backend/terraform.tfstate
      TF_STATE_LOCK_TABLE: ${{ secrets.TF_STATE_LOCK_TABLE }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Verify AWS credentials
        run: aws sts get-caller-identity

      - name: Validate backend config
        run: |
          set -euo pipefail
          test -n "${TF_STATE_BUCKET}" || (echo "TF_STATE_BUCKET secret is empty" && exit 1)
          test -n "${TF_STATE_LOCK_TABLE}" || (echo "TF_STATE_LOCK_TABLE secret is empty" && exit 1)

      - run: |
          terraform init -input=false -reconfigure \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_DEFAULT_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"
        working-directory: terraform

      - name: Validate tfvars file
        run: test -f terraform.tfvars || (echo "terraform/terraform.tfvars is missing" && exit 1)
        working-directory: terraform

      - run: terraform plan -input=false -no-color -var-file=terraform.tfvars
        working-directory: terraform

      - run: terraform apply -input=false -auto-approve -var-file=terraform.tfvars
        working-directory: terraform

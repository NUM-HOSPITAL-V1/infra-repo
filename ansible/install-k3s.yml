- hosts: control
  become: yes

  tasks:
    - name: Update packages
      apt:
        update_cache: yes

    - name: Install prerequisites
      apt:
        name:
          - curl
          - ca-certificates
        state: present

    - name: Install k3s server
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="server --disable traefik" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Verify kubectl is available
      command: kubectl version --client
      register: kubectl_check
      changed_when: false

    - name: Install helm
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Taint control plane to prevent workload scheduling
      shell: |
        kubectl taint nodes $(hostname) node-role.kubernetes.io/control-plane:NoSchedule --overwrite
      environment:
        KUBECONFIG: /etc/rancher/k3s/k3s.yaml
      changed_when: false
      failed_when: false

    - name: Get k3s node token
      command: cat /var/lib/rancher/k3s/server/node-token
      register: k3s_token
      changed_when: false

    - name: Get control node private IP
      set_fact:
        control_private_ip: "{{ ansible_default_ipv4.address }}"

- hosts: workers
  become: yes

  tasks:
    - name: Update packages
      apt:
        update_cache: yes

    - name: Install prerequisites
      apt:
        name:
          - curl
          - ca-certificates
        state: present

    - name: Uninstall existing k3s agent if present
      shell: /usr/local/bin/k3s-agent-uninstall.sh
      args:
        removes: /usr/local/bin/k3s-agent-uninstall.sh

    - name: Join worker to k3s cluster
      shell: |
        curl -sfL https://get.k3s.io | \
          K3S_URL=https://{{ hostvars[groups['control'][0]]['control_private_ip'] }}:6443 \
          K3S_TOKEN={{ hostvars[groups['control'][0]]['k3s_token']['stdout'] | trim }} \
          sh -
      args:
        creates: /usr/local/bin/k3s

{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  labels:
    {{- include "customer-registration-db.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgresUser: {{ .Values.secrets.postgresUser | quote }}
  postgresPassword: {{ .Values.secrets.postgresPassword | quote }}
{{- end }}

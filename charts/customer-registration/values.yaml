replicaCount: 1

image:
  repository: customer-registration
  pullPolicy: IfNotPresent
  tag: ""

nameOverride: ""
fullNameOverride: "customer-registration"

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

containerPort: 8081

env:
  serverPort: "8081"
  springDatasourceUrl: "jdbc:postgresql://customer-registration-db:5432/customer_db"
  hospitalPublicKey: "demo-public-key"
  hospitalPrivateKey: "demo-private-key"

secrets:
  create: true
  name: customer-registration-secrets
  existingSecret: ""
  springDatasourceUsername: "postgres"
  springDatasourcePassword: "postgres"

resources:
  requests:
    memory: "256Mi"
    cpu: "150m"
  limits:
    memory: "768Mi"
    cpu: "750m"

livenessProbe:
  httpGet:
    path: /internal/customers/health
    port: http
  initialDelaySeconds: 40
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /internal/customers/health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10

nodeSelector:
  node-role: worker

affinity: {}

tolerations: []

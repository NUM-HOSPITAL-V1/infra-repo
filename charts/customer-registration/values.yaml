replicaCount: 1

deploymentStrategy:
  type: Recreate

image:
  repository: customer-registration
  pullPolicy: IfNotPresent
  tag: ""

nameOverride: ""
fullNameOverride: "customer-registration"

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

containerPort: 8081

env:
  serverPort: "8081"
  springDatasourceUrl: "jdbc:postgresql://customer-registration-db:5432/customer_db"
  hospitalPublicKey: "demo-public-key"
  hospitalPrivateKey: "demo-private-key"

secrets:
  create: true
  name: customer-registration-secrets
  existingSecret: ""
  springDatasourceUsername: "postgres"
  springDatasourcePassword: "postgres"

resources:
  requests:
    memory: "192Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

waitForDatabase:
  enabled: true
  image:
    repository: busybox
    tag: "1.36"
    pullPolicy: IfNotPresent
  host: customer-registration-db
  port: 5432

livenessProbe:
  httpGet:
    path: /internal/customers/health
    port: http
  initialDelaySeconds: 40
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /internal/customers/health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10

nodeSelector:
  node-role: worker

affinity: {}

tolerations: []

replicaCount: 1

deploymentStrategy:
  type: Recreate

image:
  repository: customer-registration
  pullPolicy: IfNotPresent
  tag: ""

nameOverride: ""
fullNameOverride: "customer-registration"

service:
  type: ClusterIP
  port: 8081
  targetPort: 8081

containerPort: 8081

env:
  serverPort: "8081"
  springDatasourceUrl: "jdbc:postgresql://customer-registration-db.num.svc.cluster.local:5432/customer_db"
  hospitalPublicKey: "demo-public-key"
  hospitalPrivateKey: "demo-private-key"

secrets:
  create: true
  name: customer-registration-secrets
  existingSecret: ""
  springDatasourceUsername: "postgres"
  springDatasourcePassword: "postgres"

resources:
  requests:
    memory: "128Mi"
    cpu: "75m"
  limits:
    memory: "384Mi"
    cpu: "250m"

waitForDatabase:
  enabled: true
  image:
    repository: busybox
    tag: "1.36"
    pullPolicy: IfNotPresent
  host: customer-registration-db.num.svc.cluster.local
  port: 5432

startupProbe:
  httpGet:
    path: /internal/customers/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 18

livenessProbe:
  httpGet:
    path: /internal/customers/health
    port: http
  initialDelaySeconds: 90
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /internal/customers/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 10

nodeSelector: {}

affinity: {}

tolerations: []

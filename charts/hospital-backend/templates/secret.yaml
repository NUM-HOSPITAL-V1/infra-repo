{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name }}
  labels:
    {{- include "hospital-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  mongodb_uri: {{ .Values.secrets.mongodb_uri | quote }}
  JWT_SECRET: {{ .Values.secrets.JWT_SECRET | quote }}
  REFRESH_SECRET: {{ .Values.secrets.REFRESH_SECRET | quote }}
{{- end }}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "hospital-backend.fullname" . }}
  labels:
    {{- include "hospital-backend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "hospital-backend.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      name: http

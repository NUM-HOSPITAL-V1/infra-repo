apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hospital-gateway.fullname" . }}-config
  labels:
    {{- include "hospital-gateway.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        resolver kube-dns.kube-system.svc.cluster.local valid=10s ipv6=off;

        set $backend_upstream http://{{ .Values.backend.serviceName }}:{{ .Values.backend.servicePort }};
        set $frontend_upstream http://{{ .Values.frontend.serviceName }}:{{ .Values.frontend.servicePort }};
        set $backend_auth_upstream http://{{ .Values.backend.serviceName }}:{{ .Values.backend.servicePort }}{{ .Values.backend.authValidationPath }};

        client_max_body_size 10m;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-Id $request_id;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        location = /gateway-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "gateway-ok\n";
        }

        location = /api {
            return 301 /api/;
        }

        location = /api/status {
            proxy_pass $backend_upstream;
            proxy_redirect off;
        }

        location = /api/health {
            proxy_pass $backend_upstream;
            proxy_redirect off;
        }

        location ^~ /api/auth/ {
            proxy_pass $backend_upstream;
            proxy_redirect off;
        }

        location / {
            proxy_pass $frontend_upstream;
            proxy_redirect off;
        }

        location = /_gateway/auth {
            internal;
            proxy_pass $backend_auth_upstream;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Original-Method $request_method;
        }

        location /api/ {
            auth_request /_gateway/auth;
            proxy_pass $backend_upstream;
            proxy_redirect off;
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
        }
    }

replicaCount: 1

image:
  repository: nginx
  tag: "1.27-alpine"
  pullPolicy: IfNotPresent

nameOverride: ""
fullNameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 80

frontend:
  serviceName: hospital-frontend
  servicePort: 3000

backend:
  serviceName: hospital-backend
  servicePort: 8000
  authValidationPath: /api/auth/validate

resources:
  requests:
    memory: "32Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "250m"

nodeSelector:
  node-role: worker

affinity: {}

tolerations: []

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "icd10-suggest-service.fullname" . }}
  labels:
    {{- include "icd10-suggest-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.strategy.type }}
  selector:
    matchLabels:
      {{- include "icd10-suggest-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "icd10-suggest-service.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.dependencyWait.enabled }}
      initContainers:
        - name: wait-for-icd10-code-service
          image: "{{ .Values.dependencyWait.image.repository }}:{{ .Values.dependencyWait.image.tag }}"
          imagePullPolicy: {{ .Values.dependencyWait.image.pullPolicy }}
          command:
            - sh
            - -c
            - >
              timeout={{ .Values.dependencyWait.timeoutSeconds }};
              until curl -fsS "{{ .Values.env.icd10ApiUrl }}" > /dev/null; do
                timeout=$((timeout - 5));
                if [ "$timeout" -le 0 ]; then
                  echo "Timed out waiting for icd10-code-service";
                  exit 1;
                fi;
                echo "Waiting for icd10-code-service...";
                sleep 5;
              done
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "icd10-suggest-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: ICD10_API_URL
              value: {{ .Values.env.icd10ApiUrl | quote }}
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.env.springDatasourceUrl | quote }}
            - name: SPRING_H2_CONSOLE_ENABLED
              value: {{ .Values.env.springH2ConsoleEnabled | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "icd10-suggest-service.fullname" . }}

controller:
  kind: DaemonSet
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet

  nodeSelector: {}

  hostPort:
    enabled: true
    ports:
      http: 80
      https: 443

  service:
    enabled: true
    type: ClusterIP

  ingressClass: nginx

  ingressClassResource:
    name: nginx
    enabled: true
    default: true
    controllerValue: k8s.io/ingress-nginx

  watchIngressWithoutClass: false

  publishService:
    enabled: false

  tolerations:
    []

defaultBackend:
  enabled: true

server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # /hospital (trailing slash байхгүй) → redirect
    location = /hospital {
        return 301 /hospital/;
    }

    # Hospital system — /hospital/* prefix ХЭВЭЭР 8100 руу дамжуулна (strip хийхгүй)
    # Trailing slash байхгүй proxy_pass = full path шилжүүлэх
    location /hospital/ {
        proxy_pass http://localhost:8100;
    }

    # Thesis system — бусад бүх хүсэлт 9090 руу
    location / {
        proxy_pass http://localhost:9090/;
    }
}

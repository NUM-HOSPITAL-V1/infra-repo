server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=30s ipv6=off;

    client_max_body_size 10m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Request-Id $request_id;

    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    location = /gateway-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "gateway-ok\n";
    }

    location = /api/status {
        set $backend http://hospital-backend:8000;
        proxy_pass $backend;
        proxy_redirect off;
    }

    location = /api/health {
        set $backend http://hospital-backend:8000;
        proxy_pass $backend;
        proxy_redirect off;
    }

    location ^~ /api/auth/ {
        set $backend http://hospital-backend:8000;
        proxy_pass $backend;
        proxy_redirect off;
    }

    location = /_gateway/auth {
        internal;
        set $backend http://hospital-backend:8000/api/auth/validate;
        proxy_pass $backend;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;
    }

    location /api/ {
        auth_request /_gateway/auth;
        set $backend http://hospital-backend:8000;
        proxy_pass $backend;
        proxy_redirect off;
        proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
    }

    location / {
        set $frontend http://hospital-frontend:3000;
        proxy_pass $frontend;
        proxy_redirect off;
    }
}
